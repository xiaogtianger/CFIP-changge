name: Clean & Filter IP List (Best 10 by Speed or Random 8)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  filter-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 下载并智能优选 IP（排除指定网段）
        run: |
          echo "🚀 开始下载所有 IP 来源..."

          curl -s -f -L https://raw.githubusercontent.com/chris202010/yxip/refs/heads/main/ip.txt -o raw1.txt || true
          curl -s -f -L https://raw.githubusercontent.com/zhangtaile/bestIP/refs/heads/main/ipinfo.txt -o raw2.txt || true
          curl -s -f -L https://raw.githubusercontent.com/Fido6/bestip/refs/heads/dtaa/bestiphk.txt -o raw3.txt || true

          echo "🔍 提取 IP 并解析延迟..."

          # ====================== 排除网段列表（在这里添加即可） ======================
          EXCLUDE_SEGMENTS=(
            "1."     # 1.网段
            "3."     # 3.网段
            "13."    # 13.网段
            "103."   # 103.网段
            "123."   # 123.网段
            "129."   # 129.网段
            "175."   # 175.网段
            # 在这里新增网段，例如：
            # "45."
            # "104."
            # "192.168."
          )
          echo "📋 当前排除的网段：${EXCLUDE_SEGMENTS[*]}"
          # ============================================================================

          > all_with_speed.txt

          for file in raw*.txt; do
            [ ! -s "$file" ] && continue

            awk -v exclude="${EXCLUDE_SEGMENTS[*]}" '
              BEGIN { 
                FS = "#"; OFS = "#" 
                split(exclude, excl_arr, " ")
                for (i in excl_arr) {
                  if (excl_arr[i] != "") exclude_list[excl_arr[i]] = 1
                }
              }
              {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "")
                if (NF == 0 || $0 == "") next

                ip_port = $1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", ip_port)

                # 检查是否需要排除
                for (seg in exclude_list) {
                  if (ip_port ~ ("^" seg)) {
                    next
                  }
                }

                # 提取地区
                region_part = (NF >= 2) ? $2 : ""
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", region_part)
                gsub(/\|.*/, "", region_part)
                gsub(/[-0-9]+$/, "", region_part)
                gsub(/[[:space:]].*$/, "", region_part)
                region = toupper(region_part)

                if (region !~ /^(JP|KR|SG|US)$/) next

                # 提取延迟
                speed = 9999
                match($0, /([0-9]+\.?[0-9]*)[[:space:]]*(ms|毫秒)/)
                if (RSTART > 0) {
                  speed = substr($0, RSTART, RLENGTH-3) + 0
                } else {
                  match($0, /[0-9]+\.?[0-9]*[[:space:]]*ms/)
                  if (RSTART > 0) {
                    speed_str = substr($0, RSTART, RLENGTH)
                    gsub(/[^0-9.]/, "", speed_str)
                    speed = speed_str + 0
                  }
                }

                print ip_port "#" region "#" speed
              }
            ' "$file" >> all_with_speed.txt
          done

          # 后面的去重、优选、提交逻辑保持不变
          echo "🔄 去重并保留最优延迟..."
          sort -t'#' -k1,1 -k3,3n all_with_speed.txt | awk -F'#' '!seen[$1]++' > deduped.txt

          echo "🎯 按地区智能优选 IP..."
          mkdir -p best-ips
          > best-ips/clean-ip.txt

          total=0
          for country in JP KR SG US; do
            grep "#$country#" deduped.txt > "${country}.txt" 2>/dev/null || true
            lines=$(wc -l < "${country}.txt" 2>/dev/null || echo 0)
            echo "📊 $country: 找到 $lines 个可用 IP"

            if [[ $lines -gt 0 ]]; then
              has_speed=$(awk -F'#' '$3 < 9999' "${country}.txt" | wc -l)

              if [[ $has_speed -gt 0 ]]; then
                sort -t'#' -k3,3n "${country}.txt" | head -n 10 >> best-ips/clean-ip.txt
                taken=10
                echo " → 有测速数据，取最快 10 个"
              else
                if [[ $lines -le 8 ]]; then
                  cat "${country}.txt" >> best-ips/clean-ip.txt
                  taken=$lines
                else
                  shuf -n 8 "${country}.txt" >> best-ips/clean-ip.txt
                  taken=8
                fi
                echo " → 无测速数据，处理 $taken 个"
              fi
              total=$((total + taken))
            fi
          done

          awk -F'#' '{print $1 "#" $2}' best-ips/clean-ip.txt > best-ips/clean-ip.txt.tmp
          mv best-ips/clean-ip.txt.tmp best-ips/clean-ip.txt

          echo "✅ 完成！最终共 $total 个 IP"
          echo "📋 最终列表预览："
          cat best-ips/clean-ip.txt

          rm -f raw*.txt *.txt 2>/dev/null || true

      - name: 提交并推送 best-ips/clean-ip.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add best-ips/clean-ip.txt

          if git diff --staged --quiet; then
            echo "📌 文件无变化，跳过提交。"
          else
            git commit -m "chore: update best-ips/clean-ip.txt (excluded multiple segments) $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "🎉 更新成功！"
          fi
