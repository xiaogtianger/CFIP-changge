name: Clean & Filter IP List (Random 5 per Country - Total 20)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  filter-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 下载并按国家随机提取 5 个 IP（共 20 个）
        run: |
          echo "🚀 开始下载所有 IP 来源..."

          # 下载四个来源
          curl -s -f -L https://raw.githubusercontent.com/chris202010/yxip/refs/heads/main/ip.txt -o raw1.txt || true
          curl -s -f -L https://raw.githubusercontent.com/zhangtaile/bestIP/refs/heads/main/ipinfo.txt -o raw2.txt || true
          curl -s -f -L https://raw.githubusercontent.com/Fido6/bestip/refs/heads/dtaa/bestiphk.txt -o raw3.txt || true

          echo "🔍 开始过滤并按国家分组..."

          > all_filtered.txt

          for file in raw*.txt; do
            [ ! -s "$file" ] && continue
            awk '
              BEGIN { FS = "#"; OFS = "#" }
              {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "")
                if (NF == 0 || $0 == "") next

                ip_port = $1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", ip_port)

                region_part = (NF >= 2) ? $2 : ""
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", region_part)
                gsub(/\|.*/, "", region_part)
                gsub(/-[0-9]+$/, "", region_part)

                region = toupper(region_part)

                if (region ~ /^(JP|KR|SG|HK)$/) {
                  print ip_port "#" region
                }
              }
            ' "$file" >> all_filtered.txt
          done

          echo "🎲 按国家随机抽取 5 个 IP（目标总数 20）..."

          > clean-ip.txt
          total=0

          for country in JP KR SG HK; do
            grep "#$country$" all_filtered.txt > "${country}.txt" 2>/dev/null || true
            lines=$(wc -l < "${country}.txt" 2>/dev/null || echo 0)
            
            echo "📊 $country: 找到 $lines 个可用 IP"

            if [[ $lines -gt 0 ]]; then
              if [[ $lines -le 5 ]]; then
                cat "${country}.txt" >> clean-ip.txt
                echo "   → 全部保留 $lines 个"
              else
                shuf -n 5 "${country}.txt" >> clean-ip.txt
                echo "   → 随机抽取 5 个"
              fi
              taken=$(( lines > 5 ? 5 : lines ))
              total=$((total + taken))
            else
              echo "   → 该国家暂无可用 IP"
            fi
          done

          echo "✅ 提取完成！最终共 $total 个 IP（目标 20 个）"
          echo "📋 最终 IP 列表预览："
          cat clean-ip.txt || echo "（无 IP）"

          # 清理临时文件
          rm -f raw*.txt *.txt 2>/dev/null || true

      - name: 提交并推送 clean-ip.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add clean-ip.txt

          if git diff --staged --quiet; then
            echo "📌 文件无变化，跳过提交。"
          else
            git commit -m "chore: update clean-ip.txt (random 5 per country - total ~20) $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "🎉 clean-ip.txt 已更新并推送！"
          fi
